name: build-site

# Build and deploy the math-coding documentation site to GitHub Pages.
# Sources content from core/, agents/, examples/, adr/, docs/ via
# site/sync-content.sh — never duplicates the source of truth.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent builds and stale deployments.
concurrency:
  group: pages
  cancel-in-progress: false

# Required for GitHub Pages deployment with the official action.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.124.1"
          extended: true

      - name: Setup Go (for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Fetch Congo theme via git
        working-directory: site
        run: |
          rm -rf themes/congo
          git clone --depth 1 --branch v2.7.6 https://github.com/jpanther/congo.git themes/congo

      - name: Sync content from main repository
        working-directory: site
        run: sh sync-content.sh

      - name: Build Hugo site
        working-directory: site
        run: hugo --minify --gc

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp -r site/public/* public/
          touch public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4