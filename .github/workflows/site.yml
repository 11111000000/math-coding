name: build-site

# Build and deploy the math-coding documentation site to GitHub Pages.
# Sources content from core/, agents/, examples/, adr/, docs/ via
# site/sync-content.sh — never duplicates the source of truth.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent builds and stale deployments.
concurrency:
  group: pages
  cancel-in-progress: false

# Required for GitHub Pages deployment with the official action.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.140.2"
          extended: true

      - name: Setup Go (for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Sync content from main repository
        working-directory: site
        run: sh sync-content.sh

      - name: Resolve Hugo modules
        working-directory: site
        run: |
          hugo mod init github.com/11111000000/math-coding/site || true
          hugo mod get github.com/jpanther/congo/v2
          hugo mod vendor
          echo "=== module cache ==="
          ls -la _vendor/ 2>/dev/null | head -10
          echo "=== _vendor/congo _partials ==="
          ls _vendor/github.com/jpanther/congo/v2/layouts/_partials/ 2>/dev/null
          echo "=== _vendor/congo functions ==="
          ls _vendor/github.com/jpanther/congo/v2/layouts/_partials/functions/ 2>/dev/null

      - name: Build Hugo site
        working-directory: site
        run: hugo --minify --gc --themesDir _vendor/github.com/jpanther

      - name: Prepare Pages artifact
        run: |
          mkdir -p public
          cp -r site/public/* public/
          touch public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4