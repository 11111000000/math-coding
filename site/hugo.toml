baseURL = 'https://11111000000.github.io/math-coding/'
title = 'math-coding'

# Use Congo theme via Hugo modules
[module]
  [[module.imports]]
    path = "github.com/jpanther/congo/v2"
  [[module.imports]]
    path = "github.com/jpanther/congo/v2"
    disable = false

# Default language
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = true
disablePathToLower = true

# Pagination
paginate = 14
pagination.ellipsis = "&hellip;"

# Build settings
buildDrafts = false
buildFuture = false
buildExpired = false
enableInlineShortcodes = false

# Front matter
frontmatter.insertDate = true

# Hugo's Goldmark markdown renderer
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      table = true
      strikethrough = true
      linkify = true
      typographer = false
    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = "github"
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
    style = "monokai"
    tabWidth = 4

# Site params for Congo theme
[params]
  description = "A convention for mathematically grounded software artifacts"
  keywords = ["math", "formal-methods", "TLA+", "FSM", "verification"]
  images = ["banner.jpg"]
  favicon = "/favicon.svg"

  # Theme settings
  colorScheme = "congo"
  palette = "zen"
  enableThemeSwitcher = true
  enableSearch = true
  enableCodeCopy = true
  enableBlog = false

  # Fonts (overridden via assets/css/custom.css)
  googleFonts = ["JetBrains+Mono:400,500,600,700", "Spectral:400,500,600"]

  # Math (KaTeX via custom partial in layouts)
  enableMath = true
  mathRenderer = "katex"

  # Mermaid (loaded via custom partial)
  enableMermaid = true

  # Menu
  [params.menu]
    [[params.menu.main]]
      name = "Core"
      page = "/core"
      weight = 1
    [[params.menu.main]]
      name = "Theory"
      page = "/theory"
      weight = 2
    [[params.menu.main]]
      name = "ADRs"
      page = "/adr"
      weight = 3
    [[params.menu.main]]
      name = "Examples"
      page = "/examples"
      weight = 4
    [[params.menu.main]]
      name = "Agents"
      page = "/agents"
      weight = 5

  # Article display
  [params.articles]
    readingTime = false
    wordCount = false
    share = false
    showTaxonomy = false
    comment = false
    dateFormat = "2006-01-02"

  # Breadcrumb navigation
  [params.breadcrumbs]
    showOnHomePage = false

  # Open Graph
  [params.opengraph]
    twitterUser = "11111000000"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[permalinks]
  theory = "/theory/:slug/"
  theory-advanced = "/theory-advanced/:slug/"
  adr = "/adr/:slug/"
  examples = "/examples/:slug/"
  integrations = "/integrations/:slug/"
  agents = "/agents/:slug/"