task_id: math-coding-birth
assumptions:
  - id: A1
    statement: "Agents can read files as stable shared artifacts"
    status: agent-inferred
    epistemology: fact
    confidence: 0.95
    evidence: |
      Git provides file-based versioning with line-level diffs;
      agents in the post-2024 era routinely read and write
      files as their primary interface. This is the operating
      assumption of every coding agent.
      See: packet:math-coding-birth/decision.md#synthesis

  - id: A2
    statement: "Plain text + git is sufficient as a foundation"
    status: judgment
    epistemology: judgment
    evidence: |
      POSIX sh, awk, grep, sed, find are universally available
      on Linux, macOS, BSD, Alpine, and WSL. Git is the de
      facto version control standard.
      See: packet:math-coding-birth/decision.md#synthesis

  - id: A3
    statement: "Every key decision about the convention deserves a packet"
    status: judgment
    epistemology: judgment
    evidence: |
      This packet exists as a demonstration. The principle
      applies recursively to all future decisions.
      See: packet:math-coding-birth/decision.md#what-this-packet-commits-to

  - id: A4
    statement: "The convention recursively applies to itself (fractal property)"
    status: judgment
    epistemology: judgment
    evidence: |
      This packet has 5 files (declared by convention).
      agents.md lives outside math/ but is approved by the
      convention (it is the protocol, not a decision).
      Recursive observability: every packet in math/ can be
      verified against the repo at its commit.
      See: packet:math-coding-birth/refinement.md#invariant

  - id: A5
    statement: "Five files per packet is the right minimum"
    status: agent-inferred
    epistemology: hypothesis
    confidence: 0.75
    evidence: |
      manifest (what) + decision (why) + task (problem/outcome/
      constraints) + assumptions (epistemic context) +
      refinement (how). Three files would lose decision and
      refinement. Seven or more would be bureaucratic overhead.
      See: packet:math-coding-birth/decision.md#what-this-packet-commits-to
